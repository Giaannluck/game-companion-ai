<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Companion AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.wasm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep:#0a0806;--bg-panel:#1a1510;--bg-input:#221c15;
      --border:#3d3020;--gold:#c9972a;--gold-light:#e8bb5a;--gold-dim:#6b4e1a;
      --text-main:#e8dcc8;--text-dim:#8a7a62;--text-faint:#4a3f2f;--red-ember:#8b3a1a;
      --user-bg:#1e1710;--ai-bg:#141009;
    }
    html,body{height:100%;background:var(--bg-deep);color:var(--text-main);font-family:'Crimson Pro',Georgia,serif;font-size:17px;line-height:1.6;overflow:hidden;}
    #app{display:flex;flex-direction:column;height:100vh;max-width:860px;margin:0 auto;}
    header{display:flex;align-items:center;gap:14px;padding:18px 28px 14px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0f0c08 0%,transparent 100%);flex-shrink:0;}
    .emblem{width:44px;height:44px;border:2px solid var(--gold-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;background:radial-gradient(circle,#2a1f0f 0%,#0a0806 100%);box-shadow:0 0 12px rgba(201,151,42,0.15);flex-shrink:0;}
    .header-text h1{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--gold-light);letter-spacing:2px;text-transform:uppercase;}
    .header-text p{font-size:13px;color:var(--text-dim);font-style:italic;}
    .status-dot{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim);font-family:'Cinzel',serif;letter-spacing:1px;}
    .dot{width:8px;height:8px;border-radius:50%;background:#4a7a3a;box-shadow:0 0 6px #4a7a3a;animation:pulse 2.5s ease-in-out infinite;}
    .dot.thinking{background:var(--gold);box-shadow:0 0 6px var(--gold);animation:pulse-fast 0.8s ease-in-out infinite;}
    .dot.recording{background:#e05050;box-shadow:0 0 6px #e05050;animation:pulse-fast 0.6s ease-in-out infinite;}
    .dot.listening{background:#4a9a6a;box-shadow:0 0 6px #4a9a6a;animation:pulse 1.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    @keyframes pulse-fast{0%,100%{opacity:1}50%{opacity:0.3}}
    #vol-bar{position:relative;height:6px;background:var(--bg-panel);border-bottom:1px solid var(--border);flex-shrink:0;display:none;}
    #vol-bar.active{display:block;}
    #vol-fill{height:100%;width:0%;background:linear-gradient(90deg,#4a7a3a,#c9972a,#e05050);transition:width 0.05s;}
    #vol-threshold{position:absolute;top:0;height:100%;width:2px;background:rgba(255,255,255,0.6);left:50%;}
    #context-bar{display:flex;align-items:center;gap:10px;padding:8px 28px;background:var(--bg-panel);border-bottom:1px solid var(--border);flex-shrink:0;}
    #context-bar label{font-family:'Cinzel',serif;font-size:11px;color:var(--gold-dim);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;}
    #game-context-input{flex:1;background:transparent;border:none;outline:none;color:var(--text-dim);font-family:'Crimson Pro',serif;font-size:14px;font-style:italic;}
    #game-context-input::placeholder{color:var(--text-faint);}
    #screen-bar{display:none;align-items:center;gap:10px;padding:6px 28px;background:#0d1a0d;border-bottom:1px solid #1a3a1a;flex-shrink:0;}
    #screen-bar.active{display:flex;}
    #screen-bar span{font-family:'Cinzel',serif;font-size:10px;color:#4a9a4a;letter-spacing:1.5px;}
    #screen-preview{width:80px;height:45px;object-fit:cover;border:1px solid #1a3a1a;border-radius:2px;opacity:0.8;}
    #messages{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:0;scroll-behavior:smooth;}
    #messages::-webkit-scrollbar{width:4px;}
    #messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .message{display:flex;flex-direction:column;max-width:88%;animation:fadeUp 0.3s ease;margin-bottom:20px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .message.user{align-self:flex-end;align-items:flex-end;}
    .message.ai{align-self:flex-start;align-items:flex-start;}
    .message.proactive .msg-bubble{border-left:2px solid #4a7a3a !important;font-style:italic;}
    .msg-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
    .message.user .msg-label{color:var(--gold-dim);}
    .message.ai .msg-label{color:var(--text-faint);}
    .msg-bubble{padding:13px 18px;border-radius:2px;line-height:1.65;font-size:16px;}
    .message.user .msg-bubble{background:var(--user-bg);border:1px solid var(--border);border-right:2px solid var(--gold-dim);}
    .message.ai .msg-bubble{background:var(--ai-bg);border:1px solid var(--border);border-left:2px solid var(--red-ember);}
    .welcome{align-self:center;text-align:center;padding:40px 20px;max-width:480px;}
    .welcome .rune{font-size:40px;margin-bottom:16px;opacity:0.7;}
    .welcome h2{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;}
    .welcome p{font-size:15px;color:var(--text-dim);font-style:italic;line-height:1.7;}
    .typing-indicator{display:flex;gap:5px;padding:14px 18px;background:var(--ai-bg);border:1px solid var(--border);border-left:2px solid var(--red-ember);border-radius:2px;width:fit-content;}
    .typing-indicator span{width:6px;height:6px;border-radius:50%;background:var(--text-faint);animation:bounce 1.2s ease-in-out infinite;}
    .typing-indicator span:nth-child(2){animation-delay:0.2s;}
    .typing-indicator span:nth-child(3){animation-delay:0.4s;}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);background:var(--text-faint)}30%{transform:translateY(-6px);background:var(--gold-dim)}}
    #input-area{padding:16px 28px 20px;border-top:1px solid var(--border);background:linear-gradient(0deg,#0a0806 0%,transparent 100%);flex-shrink:0;}
    #input-row{display:flex;align-items:flex-end;gap:12px;background:var(--bg-input);border:1px solid var(--border);border-radius:3px;padding:10px 14px;transition:border-color 0.2s;}
    #input-row:focus-within{border-color:var(--gold-dim);}
    #user-input{flex:1;background:transparent;border:none;outline:none;color:var(--text-main);font-family:'Crimson Pro',serif;font-size:16px;resize:none;max-height:120px;min-height:24px;line-height:1.5;}
    #user-input::placeholder{color:var(--text-faint);font-style:italic;}
    #send-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold);width:36px;height:36px;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s;flex-shrink:0;}
    #send-btn:hover:not(:disabled){background:var(--gold-dim);color:var(--bg-deep);}
    #send-btn:disabled{opacity:0.3;cursor:not-allowed;}
    #mic-btn,#screen-btn{background:none;border:1px solid var(--border);color:var(--text-dim);width:36px;height:36px;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s;flex-shrink:0;}
    #mic-btn:hover:not(:disabled),#screen-btn:hover:not(:disabled){border-color:var(--gold-dim);color:var(--gold);}
    #mic-btn.active{border-color:#8b1a1a !important;color:#e05050 !important;box-shadow:0 0 16px rgba(200,50,50,0.5);}
    #screen-btn.active{border-color:#1a8b1a !important;color:#4aaa4a !important;box-shadow:0 0 16px rgba(50,200,50,0.3);}
    #mic-btn:disabled,#screen-btn:disabled{opacity:0.3;cursor:not-allowed;}
    #ptt-btn{background:none;border:1px solid var(--border);color:var(--text-dim);width:36px;height:36px;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s;flex-shrink:0;user-select:none;}
    #ptt-btn:hover:not(:disabled){border-color:var(--gold-dim);color:var(--gold);}
    #ptt-btn.active{border-color:#e05050 !important;color:#e05050 !important;box-shadow:0 0 16px rgba(200,50,50,0.5);background:#1a0808;}
    #ptt-btn:disabled{opacity:0.3;cursor:not-allowed;}
    .input-hint{font-size:11px;color:var(--text-faint);margin-top:8px;text-align:center;font-family:'Cinzel',serif;letter-spacing:1px;}
    #voice-toggle{display:flex;align-items:center;gap:8px;margin-left:auto;}
    #voice-toggle label{font-family:'Cinzel',serif;font-size:10px;color:var(--text-faint);letter-spacing:1px;cursor:pointer;}
    #voice-on{accent-color:var(--gold);cursor:pointer;}
    #volume-slider{width:70px;accent-color:var(--gold);cursor:pointer;vertical-align:middle;opacity:0.7;transition:opacity 0.2s;}
    #volume-slider:hover{opacity:1;}
    #volume-icon{font-size:13px;cursor:pointer;user-select:none;}
    #status-bar{min-height:0;overflow:hidden;transition:all 0.2s;font-size:13px;color:var(--text-dim);font-style:italic;padding:0 28px;font-family:'Crimson Pro',serif;}
    #status-bar.visible{min-height:24px;padding:6px 28px;border-bottom:1px solid var(--border);background:var(--bg-panel);}

    /* SIDEBAR */
    #outer{display:flex;height:100vh;overflow:hidden;}
    #sidebar{width:220px;background:#0d0b08;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform 0.25s;z-index:10;}
    #sidebar.collapsed{transform:translateX(-220px);position:absolute;}
    #sidebar-header{padding:14px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    #sidebar-header span{font-family:'Cinzel',serif;font-size:11px;color:var(--gold-dim);letter-spacing:2px;text-transform:uppercase;}
    #new-chat-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold);padding:4px 10px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all 0.2s;}
    #new-chat-btn:hover{background:var(--gold-dim);color:var(--bg-deep);}
    #chat-list{flex:1;overflow-y:auto;padding:8px 0;}
    #chat-list::-webkit-scrollbar{width:3px;}
    #chat-list::-webkit-scrollbar-thumb{background:var(--border);}
    .chat-item{display:flex;align-items:center;gap:0;padding:0;border-bottom:1px solid #1a140e;cursor:pointer;transition:background 0.15s;}
    .chat-item:hover{background:#1a1510;}
    .chat-item.active{background:#1e1810;border-left:2px solid var(--gold-dim);}
    .chat-item-name{flex:1;padding:10px 14px;font-size:13px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .chat-item.active .chat-item-name{color:var(--text-main);}
    .chat-item-del{padding:8px 10px;color:var(--text-faint);font-size:12px;opacity:0;transition:opacity 0.2s;}
    .chat-item:hover .chat-item-del{opacity:1;}
    .chat-item-del:hover{color:#e05050;}
    #sidebar-toggle{position:fixed;left:220px;top:50%;transform:translateY(-50%);background:#1a1510;border:1px solid var(--border);border-left:none;color:var(--text-dim);padding:8px 4px;cursor:pointer;border-radius:0 3px 3px 0;font-size:11px;transition:left 0.25s;z-index:11;}
    #sidebar-toggle.collapsed{left:0;}
    #app{flex:1;min-width:0;}
  </style>
</head>
<body>
<div id="outer">
  <div id="sidebar">
    <div id="sidebar-header">
      <span>Chats</span>
      <button id="new-chat-btn">+ Nuevo</button>
    </div>
    <div id="chat-list"></div>
  </div>
  <button id="sidebar-toggle" title="Ocultar/mostrar chats">◀</button>
<div id="app">
  <header>
    <div class="emblem">⚔️</div>
    <div class="header-text">
      <h1>Game Companion</h1>
      <p>Tu compañero de aventuras</p>
    </div>
    <div id="voice-toggle">
      <input type="checkbox" id="voice-on" checked/>
      <label for="voice-on">VOZ</label>
      <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8" title="Volumen del compañero"/>
      <span id="volume-icon">🔊</span>
    </div>
    <div class="status-dot">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">EN LÍNEA</span>
    </div>
  </header>
  <div id="vol-bar"><div id="vol-fill"></div><div id="vol-threshold"></div></div>
  <div id="context-bar">
    <label>Juego:</label>
    <input id="game-context-input" type="text" placeholder="¿Qué estás jugando? (ej: Kingdom Come Deliverance 2...)"/>
  </div>
  <div id="screen-bar">
    <span>👁 MIRANDO PANTALLA</span>
    <img id="screen-preview" src="" alt="preview"/>
  </div>
  <div id="status-bar"></div>
  <div id="messages">
    <div class="welcome" id="welcome-msg">
      <div class="rune">🏰</div>
      <h2>Compañero listo</h2>
      <p>Tocá 🖥 para compartir pantalla y 🎤 para la llamada de voz. Al abrir el micrófono, quedate callado 2 segundos para calibrar el ruido.</p>
    </div>
  </div>
  <div id="input-area">
    <div id="input-row">
      <button id="mic-btn" title="Llamada de voz">🎤</button>
      <button id="ptt-btn" title="Mantené apretado para hablar" disabled>🔴</button>
      <button id="screen-btn" title="Compartir pantalla">🖥</button>
      <textarea id="user-input" rows="1" placeholder="O escribí acá..."></textarea>
      <button id="send-btn" title="Enviar (Enter)">➤</button>
    </div>
    <div class="input-hint">🎤 Voz · 🖥 Pantalla · ENTER para texto</div>
  </div>
</div>
</div>

<script>
  // ── CHAT STORAGE ──
  let history = [];
  const STORAGE_KEY = 'kcd_chats';
  const MAX_CHATS = 15;
  let currentChatId = null;

  function genId() { return 'chat_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

  function loadAllChats() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
  }

  function saveAllChats(chats) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(chats)); } catch(e) {
      console.warn('localStorage lleno, borrando chat mas viejo');
      const chats2 = loadAllChats();
      const keys = Object.keys(chats2).sort((a,b) => (chats2[a].ts||0)-(chats2[b].ts||0));
      if (keys.length > 0) { delete chats2[keys[0]]; saveAllChats(chats2); }
    }
  }

  function saveCurrentChat() {
    if (!currentChatId || history.length === 0) return;
    const chats = loadAllChats();
    const existing = chats[currentChatId] || {};
    // Auto-name: primer mensaje del usuario
    const firstName = history.find(m => m.role === 'user')?.content || '';
    const autoName = firstName.slice(0, 30) || 'Nuevo chat';
    chats[currentChatId] = {
      id: currentChatId,
      name: existing.name || autoName,
      history: history,
      context: document.getElementById('game-context-input').value,
      ts: Date.now()
    };
    saveAllChats(chats);
    renderChatList();
  }

  function createNewChat() {
    saveCurrentChat();
    currentChatId = genId();
    history = [];
    document.getElementById('messages').innerHTML = `
      <div class="welcome" id="welcome-msg">
        <div class="rune">🏰</div>
        <h2>Compañero listo</h2>
        <p>Tocá 🖥 para compartir pantalla y 🎤 para la llamada de voz.</p>
      </div>`;
    renderChatList();
  }

  function loadChat(id) {
    saveCurrentChat();
    const chats = loadAllChats();
    const chat = chats[id];
    if (!chat) return;
    currentChatId = id;
    history = chat.history || [];
    if (chat.context) document.getElementById('game-context-input').value = chat.context;
    // Render messages
    const el = document.getElementById('messages');
    el.innerHTML = '';
    if (history.length === 0) {
      el.innerHTML = `<div class="welcome" id="welcome-msg"><div class="rune">🏰</div><h2>Compañero listo</h2><p>Chat vacío.</p></div>`;
    } else {
      history.forEach(m => {
        appendMessage(m.role === 'user' ? 'user' : 'ai', m.content);
      });
    }
    renderChatList();
  }

  function deleteChat(id) {
    const chats = loadAllChats();
    delete chats[id];
    saveAllChats(chats);
    if (currentChatId === id) {
      const remaining = Object.keys(chats);
      if (remaining.length > 0) loadChat(remaining[remaining.length - 1]);
      else createNewChat();
    } else {
      renderChatList();
    }
  }

  function renameChat(id) {
    const chats = loadAllChats();
    if (!chats[id]) return;
    const newName = prompt('Nombre del chat:', chats[id].name);
    if (newName && newName.trim()) {
      chats[id].name = newName.trim().slice(0, 40);
      saveAllChats(chats);
      renderChatList();
    }
  }

  function renderChatList() {
    const chats = loadAllChats();
    const listEl = document.getElementById('chat-list');
    listEl.innerHTML = '';
    const sorted = Object.values(chats).sort((a, b) => (b.ts||0) - (a.ts||0));
    sorted.forEach(chat => {
      const item = document.createElement('div');
      item.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
      const name = document.createElement('div');
      name.className = 'chat-item-name';
      name.textContent = chat.name || 'Chat';
      name.title = 'Doble click para renombrar';
      name.addEventListener('click', () => loadChat(chat.id));
      name.addEventListener('dblclick', () => renameChat(chat.id));
      const del = document.createElement('div');
      del.className = 'chat-item-del';
      del.textContent = '✕';
      del.title = 'Borrar';
      del.addEventListener('click', (e) => { e.stopPropagation(); if(confirm('¿Borrar este chat?')) deleteChat(chat.id); });
      item.appendChild(name);
      item.appendChild(del);
      listEl.appendChild(item);
    });
  }

  // Sidebar toggle
  document.getElementById('sidebar-toggle').addEventListener('click', () => {
    const sb = document.getElementById('sidebar');
    const btn = document.getElementById('sidebar-toggle');
    sb.classList.toggle('collapsed');
    btn.classList.toggle('collapsed');
    btn.textContent = sb.classList.contains('collapsed') ? '▶' : '◀';
  });

  document.getElementById('new-chat-btn').addEventListener('click', createNewChat);

  // Auto-save on every message
  const _origPush = Array.prototype.push;

  // Init: load last chat or create new
  (function init() {
    const chats = loadAllChats();
    const sorted = Object.values(chats).sort((a, b) => (b.ts||0) - (a.ts||0));
    if (sorted.length > 0) {
      loadChat(sorted[0].id);
    } else {
      createNewChat();
    }
  })();

  const messagesEl = document.getElementById('messages');
  const userInput  = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const micBtn     = document.getElementById('mic-btn');
  const screenBtn  = document.getElementById('screen-btn');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const gameCtx    = document.getElementById('game-context-input');
  const voiceOn      = document.getElementById('voice-on');
  const volumeSlider = document.getElementById('volume-slider');
  const volumeIcon   = document.getElementById('volume-icon');

  volumeSlider.addEventListener('input', () => {
    const v = parseFloat(volumeSlider.value);
    if (currentAudio) currentAudio.volume = v;
    volumeIcon.textContent = v === 0 ? '🔇' : v < 0.4 ? '🔉' : '🔊';
  });
  const statusBar  = document.getElementById('status-bar');
  const volBar     = document.getElementById('vol-bar');
  const volFill    = document.getElementById('vol-fill');
  const volThresh  = document.getElementById('vol-threshold');
  const screenBar  = document.getElementById('screen-bar');
  const screenPrev = document.getElementById('screen-preview');

  let isThinking = false;
  let isSpeaking = false;
  let callActive = false;

  // Voice
  let mediaRecorder  = null;
  let audioChunks    = [];
  let isRecording    = false;
  let isWaitingVoice = false;
  let silenceTimer   = null;
  let silentFrames   = 0;
  let voiceFrames    = 0;
  let audioCtx       = null;
  let analyser       = null;
  let animFrame      = null;
  let micStream      = null;
  let voiceThreshold = 30;

  // PTT only — no VAD

  // Screen
  let screenStream    = null;
  let screenActive    = false;
  let screenInterval  = null;
  let lastScreenB64   = null;
  let lastProactiveTs = 0;
  const SCREEN_INTERVAL    = 35000;
  const PROACTIVE_COOLDOWN = 40000;

  // ── SCREEN ──
  screenBtn.addEventListener('click', async () => {
    if (screenActive) stopScreen(); else await startScreen();
  });

  async function startScreen() {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 1 }, audio: false });
      screenActive = true;
      screenBtn.classList.add('active');
      screenBtn.title = 'Click para dejar de compartir';
      screenBar.classList.add('active');
      screenStream.getVideoTracks()[0].onended = () => stopScreen();
      captureScreen();
      screenInterval = setInterval(captureAndMaybeComment, SCREEN_INTERVAL);
    } catch (err) {
      setStatusBar('❌ No se pudo compartir pantalla');
      setTimeout(clearStatusBar, 3000);
    }
  }

  function stopScreen() {
    screenActive = false;
    if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
    clearInterval(screenInterval);
    screenBtn.classList.remove('active');
    screenBtn.title = 'Compartir pantalla';
    screenBar.classList.remove('active');
    lastScreenB64 = null;
  }

  function captureScreen() {
    if (!screenStream || !screenActive) return;
    try {
      const video = document.createElement('video');
      video.srcObject = screenStream;
      video.play();
      video.addEventListener('loadeddata', () => {
        const canvas = document.createElement('canvas');
        canvas.width = 640; canvas.height = 360;
        canvas.getContext('2d').drawImage(video, 0, 0, 640, 360);
        lastScreenB64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
        screenPrev.src = canvas.toDataURL('image/jpeg', 0.6);
        video.pause(); video.srcObject = null;
      }, { once: true });
    } catch(e) {}
  }

  async function captureAndMaybeComment() {
    if (!screenActive || isThinking) return;
    captureScreen();
    await new Promise(r => setTimeout(r, 400));
    if (!lastScreenB64) return;
    if (Date.now() - lastProactiveTs < PROACTIVE_COOLDOWN) return;
    await proactiveComment(lastScreenB64);
  }

  async function proactiveComment(imageB64) {
    if (isThinking) return;
    isThinking = true;
    lastProactiveTs = Date.now();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [{ role: 'user', content: 'Mirá esta captura del juego. Respondé SOLO si ves algo realmente notable: un enemigo cerca, una misión activa, un item valioso, una cinemática, peligro inminente, o algo curioso del lore. Variá cómo arrancás cada comentario, nunca repitas la misma frase de apertura. Si no hay nada especial, respondé únicamente la palabra SILENCIO y nada más.' }],
          gameContext: gameCtx.value.trim() || null,
          imageBase64: imageB64,
          isProactive: true
        })
      });
      const data = await res.json();
      isThinking = false;
      if (!data.message) return;
      const msg = data.message.trim();
      if (msg.toUpperCase().includes('SILENCIO')) return;
      appendMessage('ai', msg, true);
      history.push({ role: 'assistant', content: msg });
      saveCurrentChat();
      if (voiceOn.checked) {
        isSpeaking = true;
        setStatus('thinking', 'HABLANDO...');
        // Limitar respuesta proactiva a 200 chars para ahorrar creditos ElevenLabs
        const msgTTS = msg.length > 200 ? msg.slice(0, msg.lastIndexOf(' ', 200)) + '...' : msg;
        speak(msgTTS, () => {
          isSpeaking = false;
          if (callActive) { setStatus('listening', 'ESCUCHANDO...'); setStatusBar('🎙 Escuchando...'); }
        });
      }
    } catch(e) { isThinking = false; }
  }

  // ── MIC ──
  micBtn.addEventListener('click', async () => {
    if (callActive) endCall(); else await startCall();
  });

  let micVAD = null;

  async function startCall() {
    try {
      callActive = true;
      micBtn.classList.add('active');
      micBtn.textContent = '📵';
      micBtn.title = 'Click para colgar';
      volBar.classList.add('active');
      document.getElementById('ptt-btn').disabled = false;
      setStatus('listening', 'INICIANDO...');
      setStatusBar('🎙 Cargando detector de voz...');

      micVAD = await vad.MicVAD.new({
        onSpeechStart: () => {
          if (!callActive || isThinking) return;
          if (currentAudio) { currentAudio.pause(); currentAudio = null; }
          setStatus('recording', 'GRABANDO...');
          setStatusBar('🔴 Grabando...');
        },
        onSpeechEnd: async (audio) => {
          if (!callActive) return;
          setStatus('thinking', 'TRANSCRIBIENDO...');
          setStatusBar('⏳ Transcribiendo...');
          const wavBlob = float32ToWav(audio, 16000);
          await transcribeAndSend(wavBlob);
        },
        onnxWASMBasePath: 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/',
        baseAssetPath: 'https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/',
        positiveSpeechThreshold: 0.6,
        negativeSpeechThreshold: 0.4,
        minSpeechFrames: 4,
        preSpeechPadFrames: 10,
        redemptionFrames: 12,
      });

      micVAD.start();
      setStatus('listening', 'ESCUCHANDO...');
      setStatusBar('🎙 Escuchando...');
    } catch (err) {
      callActive = false;
      micBtn.classList.remove('active');
      micBtn.textContent = '🎤';
      setStatusBar('❌ Error: ' + err.message);
      console.error(err);
    }
  }

  function endCall() {
    callActive = false;
    if (micVAD) { try { micVAD.pause(); } catch(e) {} micVAD = null; }
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    micBtn.classList.remove('active');
    micBtn.textContent = '🎤';
    micBtn.title = 'Llamada de voz';
    volBar.classList.remove('active');
    volFill.style.width = '0%';
    document.getElementById('ptt-btn').disabled = true;
    setStatus('online', 'EN LÍNEA');
    clearStatusBar();
  }

  // Convierte Float32Array de Silero VAD a WAV para Whisper
  function float32ToWav(samples, sampleRate) {
    const buffer = new ArrayBuffer(44 + samples.length * 2);
    const view = new DataView(buffer);
    const ws = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
    ws(0,'RIFF'); view.setUint32(4, 36 + samples.length * 2, true);
    ws(8,'WAVE'); ws(12,'fmt '); view.setUint32(16,16,true); view.setUint16(20,1,true);
    view.setUint16(22,1,true); view.setUint32(24,sampleRate,true);
    view.setUint32(28,sampleRate*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true);
    ws(36,'data'); view.setUint32(40,samples.length*2,true);
    let offset = 44;
    for (let i = 0; i < samples.length; i++) {
      const s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
    return new Blob([buffer], { type: 'audio/wav' });
  }

  function setupMediaRecorder() {
    // Crear MediaRecorder UNA SOLA VEZ y reutilizarlo
    if (!micStream) return;
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' :
                     MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
    try { mediaRecorder = mimeType ? new MediaRecorder(micStream, { mimeType }) : new MediaRecorder(micStream); }
    catch(e) { mediaRecorder = new MediaRecorder(micStream); }

    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      if (!callActive) { resetToListening(); return; }
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      if (blob.size < 1000) { resetToListening(); return; }
      await transcribeAndSend(blob);
    };
  }

  function beginRecording() {
    if (isRecording || !mediaRecorder) return;
    audioChunks = [];
    mediaRecorder.start(100);
    isRecording = true;
    setStatus('recording', 'GRABANDO...');
  }

  function finishRecording() {
    if (!isRecording || !mediaRecorder) return;
    isRecording = false;
    if (mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  }

  function abortRecording() {
    clearTimeout(silenceTimer); silenceTimer = null;
    silentFrames = 0; voiceFrames = 0;
    isRecording = false;
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.ondataavailable = null;
      mediaRecorder.onstop = null;
      try { mediaRecorder.stop(); } catch(e) {}
    }
  }

  async function transcribeAndSend(blob) {
    setStatus('thinking', 'TRANSCRIBIENDO...');
    setStatusBar('⏳ Transcribiendo...');
    try {
      const formData = new FormData();
      formData.append('file', blob, blob.type === 'audio/wav' ? 'audio.wav' : 'audio.webm');
      const res  = await fetch('/api/transcribe', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.error) { setStatusBar('❌ ' + data.error); resetToListening(); return; }
      const transcript = data.transcript?.trim();
      if (!transcript) { resetToListening(); return; }
      clearStatusBar();
      if (screenActive) captureScreen();
      await new Promise(r => setTimeout(r, 300));
      await processMessage(transcript);
    } catch (err) {
      setStatusBar('❌ ' + err.message);
      resetToListening();
    }
  }

  function resetToListening() {
    if (callActive) {
      setStatus('listening', 'ESCUCHANDO...');
      setStatusBar('🎙 Escuchando...');
    }
  }

  // ── TTS (ElevenLabs) ──
  let currentAudio = null;

  async function speak(text, onEnd) {
    if (!voiceOn.checked) { if (onEnd) onEnd(); return; }

    // Parar audio anterior si hay
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }

    const finish = () => { if (onEnd) onEnd(); };

    try {
      const res = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      if (!res.ok) {
        console.warn('🔊 ElevenLabs falló, usando Web Speech API como fallback');
        speakFallback(text, onEnd);
        return;
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.volume = parseFloat(volumeSlider.value);
      // Timeout de seguridad 30s por si onended no dispara
      const safetyTimer = setTimeout(() => {
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        finish();
      }, 30000);
      currentAudio.onended = () => { clearTimeout(safetyTimer); URL.revokeObjectURL(url); currentAudio = null; finish(); };
      currentAudio.onerror = () => { clearTimeout(safetyTimer); URL.revokeObjectURL(url); currentAudio = null; finish(); };
      await currentAudio.play();
    } catch (err) {
      console.warn('🔊 Error TTS:', err.message);
      speakFallback(text, onEnd);
    }
  }

  // Fallback con Web Speech API por si ElevenLabs falla
  function speakFallback(text, onEnd) {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'es-ES'; utter.rate = 1.05; utter.pitch = 0.95;
    const voices = window.speechSynthesis.getVoices();
    const esVoice = voices.find(v => v.lang.startsWith('es'));
    if (esVoice) utter.voice = esVoice;
    let ended = false;
    const finish = () => { if (ended) return; ended = true; if (onEnd) onEnd(); };
    const safetyTimer = setTimeout(finish, 15000);
    utter.onend  = () => { clearTimeout(safetyTimer); finish(); };
    utter.onerror = () => { clearTimeout(safetyTimer); finish(); };
    window.speechSynthesis.speak(utter);
  }
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

  // ── TEXT INPUT ──
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTextMessage(); }
  });
  sendBtn.addEventListener('click', sendTextMessage);

  // ── PUSH TO TALK ──
  const pttBtn = document.getElementById('ptt-btn');
  let pttActive = false;

  const pttStart = () => {
    if (!callActive || isThinking || pttActive) return;
    // Cancelar cualquier audio que esté sonando
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    pttActive = true;
    pttBtn.classList.add('active');
    clearTimeout(silenceTimer); silenceTimer = null;
    silentFrames = 0; voiceFrames = 0;
    isWaitingVoice = false;
    if (!isRecording) beginRecording();
    setStatusBar('🔴 Grabando (PTT)...');
  };

  const pttStop = () => {
    if (!pttActive) return;
    pttActive = false;
    pttBtn.classList.remove('active');
    if (isRecording) {
      finishRecording();
    } else {
      resetToListening();
    }
  };

  pttBtn.addEventListener('mousedown', pttStart);
  pttBtn.addEventListener('mouseup', pttStop);
  pttBtn.addEventListener('mouseleave', pttStop);
  pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); pttStart(); });
  pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); pttStop(); });

  // Tecla { como push-to-talk
  document.addEventListener('keydown', (e) => {
    if (e.code === 'F13' && !e.repeat) { e.preventDefault(); pttStart(); }
  });
  document.addEventListener('keyup', (e) => {
    if (e.code === 'F13') { e.preventDefault(); pttStop(); }
  });

  function sendTextMessage() {
    const text = userInput.value.trim();
    if (!text || isThinking) return;
    userInput.value = ''; userInput.style.height = 'auto';
    if (screenActive) captureScreen();
    setTimeout(() => processMessage(text), 300);
  }

  // ── CORE ──
  async function processMessage(text) {
    if (isThinking) return;
    isThinking = true;
    sendBtn.disabled = true;
    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    showTyping();
    setStatus('thinking', 'PENSANDO...');
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: history,
          gameContext: gameCtx.value.trim() || null,
          imageBase64: null
        })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        appendMessage('ai', '⚠️ ' + data.error);
        isThinking = false; sendBtn.disabled = false;
        resetToListening();
      } else {
        appendMessage('ai', data.message);
        history.push({ role: 'assistant', content: data.message });
        saveCurrentChat();
        if (voiceOn.checked) {
          isSpeaking = true;
          setStatus('thinking', 'HABLANDO...');
          const textToSpeak = data.message.length > 300 ? data.message.slice(0, 297) + '...' : data.message;
          speak(textToSpeak, () => {
            isSpeaking = false;
            isThinking = false; sendBtn.disabled = false;
            resetToListening();
          });
        } else {
          isThinking = false; sendBtn.disabled = false;
          resetToListening();
        }
      }
    } catch (err) {
      removeTyping();
      appendMessage('ai', '⚠️ No pude conectarme.');
      isThinking = false; sendBtn.disabled = false;
      resetToListening();
    }
  }

  // ── STATUS ──
  function setStatus(type, text) {
    const map = { online:'dot', thinking:'dot thinking', recording:'dot recording', listening:'dot listening' };
    statusDot.className = map[type] || 'dot';
    statusText.textContent = text;
  }
  function setStatusBar(msg) { statusBar.textContent = msg; statusBar.classList.add('visible'); }
  function clearStatusBar()  { statusBar.textContent = ''; statusBar.classList.remove('visible'); }

  // ── UI ──
  function appendMessage(role, text, proactive = false) {
    const welcome = document.getElementById('welcome-msg');
    if (welcome) welcome.remove();
    const wrap = document.createElement('div');
    wrap.className = `message ${role}${proactive ? ' proactive' : ''}`;
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'Vos' : (proactive ? '👁 Compañero' : 'Compañero');
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    wrap.appendChild(label); wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'message ai'; wrap.id = 'typing-wrap';
    const label = document.createElement('div');
    label.className = 'msg-label'; label.textContent = 'Compañero';
    const ind = document.createElement('div');
    ind.className = 'typing-indicator';
    ind.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(label); wrap.appendChild(ind);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-wrap');
    if (el) el.remove();
  }
</script>
